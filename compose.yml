# REPL:     docker compose run --rm noob
# One-shot: docker compose run --rm noob exec -p "your prompt"
services:
  noob:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: noob
    # Host networking so the agent reaches local model servers and MCP
    # endpoints on loopback (llama.cpp :8090, websearch MCP :8000, ...).
    network_mode: host
    working_dir: /work
    # Files written to /work must never be root-owned on the host.
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ${WORKSPACE:-.}:/work
      - ${NOOB_CONFIG:-./config}:/config
    stdin_open: true
    tty: true
